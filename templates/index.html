<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><title>Family Maze Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #welcome-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        #board { display: grid; grid-template-columns: repeat(10, 55px); gap: 1px; background: #333; padding: 5px; }
        .cell { 
            width: 55px; height: 55px; background: #111; position: relative; 
            background-size: contain; background-repeat: no-repeat; 
            box-sizing: border-box; 
        }
        .revealed { background: #444; }
        
        /* Wall Fix - No layout shift */
        .wall-top { box-shadow: inset 0 5px 0 0 #ff4d4d; }
        .wall-left { box-shadow: inset 5px 0 0 0 #ff4d4d; }
        .wall-top.wall-left { box-shadow: inset 5px 5px 0 0 #ff4d4d; }

        #log-box { flex-grow: 1; overflow-y: auto; background: #0a0a0a; padding: 10px; font-size: 13px; border: 1px solid #333; color: #aaa; }
        .p-dot { width: 16px; height: 16px; background: cyan; border-radius: 50%; margin: 18px auto; border: 2px solid white; box-shadow: 0 0 10px cyan; }
        
        button { padding: 10px 20px; cursor: pointer; background: #2ecc71; border: none; color: white; border-radius: 5px; font-weight: bold; }
        .copy-btn { background: #3498db; margin-top: 5px; width: 100%; font-size: 12px; }
    </style>
</head>
<body>
    <div id="welcome-overlay">
        <h1>Family Maze Adventure</h1>
        <p><a href="https://docs.google.com/document/d/1V2dLYzytEPp-pj8lYusuTic1JNMxjCUr5TD_5PVWVbE/edit" target="_blank" style="color: #3498db;">Click here to read the Game Rules</a></p>
        <input type="text" id="name-input" placeholder="Your Name" style="padding: 12px; font-size: 16px; border-radius: 5px; border: none;"><br>
        <button onclick="startGame()">Enter Maze</button>
    </div>

    <div id="status" style="display:flex; justify-content: space-around; padding: 10px; background: #111; border-bottom: 2px solid #333;">
        <div>Injuries: <span id="inj">0</span>/5</div>
        <div>Bullets: <span id="bul">3</span></div>
        <div>Bombs: <span id="bom">3</span></div>
    </div>

    <div style="display: flex; flex-grow: 1;">
        <div id="sidebar" style="width: 240px; display: flex; flex-direction: column; padding: 10px; border-left: 1px solid #333;">
            <div id="log-box"></div>
            <button class="copy-btn" onclick="copyLogs()">📋 Copy History</button>
        </div>
        <div style="flex-grow: 1; display: flex; align-items: center; justify-content: center;">
            <div id="board"></div>
        </div>
    </div>

    <script>
        const socket = io();
        function startGame() {
            const name = document.getElementById('name-input').value || "Explorer";
            socket.emit('join', { name: name, is_man: false });
            document.getElementById('welcome-overlay').style.display = 'none';
        }

        function copyLogs() {
            const logs = Array.from(document.querySelectorAll('.log-entry')).map(e => e.innerText).join('\n');
            navigator.clipboard.writeText(logs).then(() => alert("Game log copied!"));
        }

        socket.on('sync', d => {
            const my = d.players.find(p => p.id === socket.id);
            if(!my) return;
            document.getElementById('inj').innerText = my.injuries;
            document.getElementById('bul').innerText = my.bul;
            document.getElementById('bom').innerText = my.bom;
            document.getElementById('log-box').innerHTML = d.logs.map(m => `<div class="log-entry">${m}</div>`).join('');
            
            const b = document.getElementById('board'); b.innerHTML = '';
            for(let y=0; y<10; y++) {
                for(let x=0; x<10; x++) {
                    const cellData = d.maze[y][x];
                    const cell = document.createElement('div');
                    const isKnown = my.known_tiles.some(t => t[0] === x && t[1] === y);
                    
                    cell.className = 'cell' + (isKnown ? ' revealed' : '');
                    if(isKnown) {
                        if(cellData.walls.top) cell.classList.add('wall-top');
                        if(cellData.walls.left) cell.classList.add('wall-left');
                        if(cellData.tile !== "empty") cell.style.backgroundImage = `url('/static/${cellData.tile}.png')`;
                    }
                    if(my.x === x && my.y === y) {
                        const dot = document.createElement('div'); dot.className = 'p-dot';
                        cell.appendChild(dot);
                    }
                    if(d.phase === 2 && !my.has_spawned) cell.onclick = () => socket.emit('set_spawn', {x,y});
                    b.appendChild(cell);
                }
            }
        });

        window.addEventListener('keydown', e => {
            const keys = {ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0]};
            if(keys[e.key]) socket.emit('move', {dx: keys[e.key][0], dy: keys[e.key][1]});
        });
    </script>
</body>
</html>
