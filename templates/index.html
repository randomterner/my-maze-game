<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Castle Maze Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #welcome { position: fixed; inset: 0; background: #000; z-index: 400; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #main-ui { display: flex; flex-grow: 1; overflow: hidden; }
        #bag { width: 120px; background: #111; border-left: 2px solid #333; padding: 10px; font-size: 11px; }
        #log-area { width: 170px; background: #111; border-right: 2px solid #333; padding: 10px; font-size: 10px; overflow-y: auto; color: #ccc; }
        #board-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; direction: ltr !important; }
        #board { display: grid; grid-template-columns: 25px repeat(10, 32px); grid-template-rows: 25px repeat(10, 32px); gap: 1px; background: #333; padding: 5px; }
        @media (min-width: 600px) { #board { grid-template-columns: 30px repeat(10, 48px); grid-template-rows: 30px repeat(10, 48px); } .cell { width: 48px !important; height: 48px !important; } }
        .cell { width: 32px; height: 32px; background: #111; position: relative; background-size: contain; }
        .coord { background: #222; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #777; font-weight: bold; }
        .revealed { background: #222; }
        .wall-top { box-shadow: inset 0 5px 0 0 red; }
        .wall-left { box-shadow: inset 5px 0 0 0 red; }
        .p-dot { width: 60%; height: 60%; background: cyan; border-radius: 50%; margin: 20%; border: 2px solid white; box-shadow: 0 0 10px cyan; }
        #ui { height: 150px; background: #222; display: flex; border-top: 2px solid #444; }
        .dpad { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 5px; padding: 10px; }
        .btn { width: 45px; height: 45px; background: #444; border: none; color: white; border-radius: 8px; font-size: 18px; }
        .action-btns { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; padding: 10px; gap: 8px; }
        .act-btn { padding: 10px; border: none; color: white; border-radius: 5px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>
    <div id="welcome">
        <h2>Castle Maze 🏰</h2>
        <input type="text" id="name-in" placeholder="Player Name..." style="padding:10px;"><br>
        <button onclick="join()" style="padding:10px 20px; background:green; color:white; border:none; border-radius:5px;">START</button>
    </div>
    <div id="status" style="display:flex; justify-content: space-around; padding: 10px; background: #111; border-bottom: 2px solid #333;">
        <div id="turn-info" style="color: lime; font-weight: bold;">Wait...</div>
        <div>❤️ <span id="inj-val">0</span>/5 | 🔫 <span id="bul-val">3</span> | 💣 <span id="bom-val">3</span></div>
    </div>
    <div id="main-ui">
        <div id="bag"><b>🎒 BAG:</b><div id="item-list"></div></div>
        <div id="board-container"><div id="board"></div></div>
        <div id="log-area"></div>
    </div>
    <div id="ui">
        <div class="dpad">
            <button class="btn" onclick="socket.emit('move',{dx:0,dy:-1})">↑</button>
            <button class="btn" onclick="socket.emit('move',{dx:-1,dy:0})">←</button>
            <button class="btn" onclick="socket.emit('move',{dx:1,dy:0})">→</button>
            <button class="btn" onclick="socket.emit('move',{dx:0,dy:1})">↓</button>
        </div>
        <div class="action-btns">
            <button onclick="socket.emit('shoot',{dx:0,dy:-1})" style="background:#a00;" class="act-btn">SHOOT UP 🔫</button>
            <button onclick="socket.emit('bomb',{dx:0,dy:-1})" style="background:#555;" class="act-btn">BOMB UP 💣</button>
        </div>
    </div>
    <script>
        const socket = io();
        function join() { socket.emit('join', { name: document.getElementById('name-in').value || "Explorer" }); document.getElementById('welcome').style.display='none'; }
        socket.on('sync', d => {
            const my = d.players.find(p => p.id === socket.id); if(!my) return;
            document.getElementById('turn-info').innerText = (d.turn_id === socket.id) ? "YOUR TURN!" : "Waiting...";
            document.getElementById('inj-val').innerText = my.injuries;
            document.getElementById('bul-val').innerText = my.bul; document.getElementById('bom-val').innerText = my.bom;
            document.getElementById('item-list').innerHTML = my.items.map(i => `<div>• ${i}</div>`).join('');
            document.getElementById('log-area').innerHTML = d.logs.map(l => `<div style="margin-bottom:3px;">${l}</div>`).join('');
            
            const b = document.getElementById('board'); b.innerHTML = '';
            b.appendChild(document.createElement('div'));
            for(let i=1; i<=10; i++){ const h=document.createElement('div'); h.className='coord'; h.innerText=i; b.appendChild(h); }
            const vision = my.items.includes('flashlight') && my.items.includes('batteries');
            for(let y=0; y<10; y++) {
                const l=document.createElement('div'); l.className='coord'; l.innerText=y+1; b.appendChild(l);
                for(let x=0; x<10; x++) {
                    const td = d.maze[y][x]; const c = document.createElement('div');
                    const known = vision || my.known_tiles.some(t => t[0] === x && t[1] === y) || 
                                  my.post_lost_tiles.some(t => t[0] === x && t[1] === y) || d.phase === 2;
                    c.className = 'cell' + (known ? ' revealed' : '');
                    if(known && d.phase === 3) {
                        if(td.walls.top) c.classList.add('wall-top'); if(td.walls.left) c.classList.add('wall-left');
                        if(td.tile !== "empty") c.style.backgroundImage = `url('/static/${td.tile}.png')`;
                    }
                    if(!my.is_lost && my.x === x && my.y === y && my.has_spawned) {
                        const dot = document.createElement('div'); dot.className = 'p-dot'; c.appendChild(dot);
                    }
                    if(d.phase === 2 && !my.has_spawned) c.onclick = () => socket.emit('set_spawn', {x, y});
                    b.appendChild(c);
                }
            }
        });
    </script>
</body>
</html>
