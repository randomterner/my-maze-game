<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maze RPG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #welcome { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #main-ui { display: flex; flex-grow: 1; overflow: hidden; }
        #inv { width: 110px; background: #111; border-left: 2px solid #333; padding: 10px; font-size: 11px; }
        #logs { width: 180px; background: #111; border-right: 2px solid #333; padding: 10px; font-size: 10px; overflow-y: auto; color: #ccc; }
        #board-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; direction: ltr !important; }
        #board { display: grid; grid-template-columns: repeat(10, 32px); gap: 1px; background: #333; padding: 4px; }
        @media (min-width: 600px) { #board { grid-template-columns: repeat(10, 50px); } .cell { width: 50px !important; height: 50px !important; } }
        .cell { width: 32px; height: 32px; background: #111; position: relative; background-size: contain; }
        .revealed { background: #222; }
        .wall-top { box-shadow: inset 0 5px 0 0 red; }
        .wall-left { box-shadow: inset 5px 0 0 0 red; }
        .wall-top.wall-left { box-shadow: inset 5px 0 0 0 red, inset 0 5px 0 0 red !important; }
        .p-dot { width: 60%; height: 60%; background: cyan; border-radius: 50%; margin: 20%; border: 2px solid white; box-shadow: 0 0 10px cyan; }
        .lost-overlay { position: absolute; inset: 0; background: rgba(255,0,0,0.1); pointer-events: none; }
        #controls { height: 150px; background: #222; display: flex; border-top: 2px solid #444; }
        .dpad { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 5px; padding: 10px; }
        .btn { width: 45px; height: 45px; background: #444; border: none; color: white; border-radius: 8px; font-size: 18px; }
        .act-btn { height: 35px; background: #555; border: none; color: white; border-radius: 5px; margin-bottom: 5px; width: 100%; font-size: 12px; }
        .active { background: #f1c40f !important; color: #000; }
    </style>
</head>
<body>
    <div id="welcome">
        <h1>מבוך המשפחה</h1>
        <input type="text" id="name" placeholder="הכנס שם שחקן..."><br>
        <button onclick="join()" style="padding:10px 20px; background:green; color:white; border:none; border-radius:5px; font-weight:bold;">START</button><br>
        <a href="https://docs.google.com/document/d/1V2dLYzytEPp-pj8lYusuTic1JNMxjCUr5TD_5PVWVbE/edit" target="_blank" style="color:cyan;">חוקי המשחק (Rules)</a>
    </div>
    <div id="status" style="display:flex; justify-content: space-around; padding: 8px; background: #111; border-bottom: 2px solid #333;">
        <div id="turn" style="color: lime; font-weight: bold;">...</div>
        <div>❤️ <span id="inj">0</span>/5</div>
        <div>🔫 <span id="bul">3</span> | 💣 <span id="bom">3</span></div>
    </div>
    <div id="main-ui">
        <div id="inv"><b>🎒 מלאי:</b><div id="inv-list"></div></div>
        <div id="board-area"><div id="board"></div><div id="lost-layer" class="lost-overlay" style="display:none;"></div></div>
        <div id="logs"><b>📜 יומן:</b><div id="log-content"></div></div>
    </div>
    <div id="controls">
        <div class="dpad">
            <button class="btn" style="grid-area: up" onclick="move(0,-1)">↑</button>
            <button class="btn" style="grid-area: left" onclick="move(-1,0)">←</button>
            <button class="btn" style="grid-area: right" onclick="move(1,0)">→</button>
            <button class="btn" style="grid-area: down" onclick="move(0,1)">↓</button>
        </div>
        <div style="flex-grow:1; padding:10px;">
            <button id="s-btn" class="act-btn" onclick="setMode('shoot')">SHOOT 🔫</button>
            <button id="b-btn" class="act-btn" onclick="setMode('bomb')">BOMB 💣</button>
            <div id="lost-txt" style="color:red; font-size:12px; text-align:center; display:none;">⚠️ אתה אבוד (LOST)</div>
        </div>
    </div>
    <script>
        const socket = io(); let curMode = 'move';
        function join() { socket.emit('join', { name: document.getElementById('name').value || "Explorer" }); document.getElementById('welcome').style.display='none'; }
        function setMode(m) { curMode = (curMode === m) ? 'move' : m; document.getElementById('s-btn').className = curMode==='shoot'?'act-btn active':'act-btn'; document.getElementById('b-btn').className = curMode==='bomb'?'act-btn active':'act-btn'; }
        function move(dx, dy) { if(curMode==='move') socket.emit('move',{dx,dy}); else if(curMode==='shoot'){ socket.emit('shoot',{dx,dy}); setMode('move'); } else { socket.emit('bomb',{dx,dy}); setMode('move'); } }
        socket.on('sync', d => {
            const my = d.players.find(p => p.id === socket.id); if(!my) return;
            document.getElementById('inj').innerText = my.injuries;
            document.getElementById('bul').innerText = my.bul; document.getElementById('bom').innerText = my.bom;
            document.getElementById('turn').innerText = (d.turn_id === socket.id) ? "תורך!" : "ממתין לתור...";
            document.getElementById('lost-txt').style.display = my.is_lost ? "block" : "none";
            document.getElementById('lost-layer').style.display = my.is_lost ? "block" : "none";
            document.getElementById('inv-list').innerHTML = my.items.map(i => `<div>- ${i}</div>`).join('');
            document.getElementById('log-content').innerHTML = d.logs.map(l => `<div>${l}</div>`).join('');
            const b = document.getElementById('board'); b.innerHTML = '';
            const vision = my.items.includes('flashlight') && my.items.includes('batteries');
            for(let y=0; y<10; y++) for(let x=0; x<10; x++) {
                const td = d.maze[y][x]; const c = document.createElement('div');
                const known = vision || my.known_tiles.some(t => t[0] === x && t[1] === y);
                c.className = 'cell' + (known ? ' revealed' : '');
                if(known) {
                    if(td.walls.top) c.classList.add('wall-top'); if(td.walls.left) c.classList.add('wall-left');
                    if(td.tile !== "empty") c.style.backgroundImage = `url('/static/${td.tile}.png')`;
                }
                if(!my.is_lost && my.x === x && my.y === y) { const dot = document.createElement('div'); dot.className = 'p-dot'; c.appendChild(dot); }
                if(d.phase === 2 && !my.has_spawned) c.onclick = () => socket.emit('set_spawn', {x, y});
                b.appendChild(c);
            }
        });
    </script>
</body>
</html>
