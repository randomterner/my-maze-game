<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><title>מבוך</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        #welcome { position: fixed; width: 100%; height: 100%; background: #111; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #board { display: grid; grid-template-columns: repeat(10, 55px); gap: 2px; margin: 10px auto; width: max-content; }
        .cell { width: 55px; height: 55px; background: #111; border: 1px solid #222; position: relative; background-size: cover; }
        .revealed { background: #333; }
        .p-self { background: yellow; border-radius: 50%; width: 20px; height: 20px; position: absolute; z-index: 5; box-shadow: 0 0 10px yellow; }
        .wall-top { border-top: 4px solid red; }
        .wall-left { border-left: 4px solid red; }
        #status { background: #222; padding: 10px; display: flex; justify-content: space-around; border-bottom: 2px solid #444; }
        #win { display:none; position:fixed; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; flex-direction:column; align-items:center; justify-content:center; color:gold; }
        .controls-hint { font-size: 12px; color: #888; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>
    <div id="win"><h1 id="winner"></h1><p>ניצח במשחק!</p></div>
    
    <div id="welcome">
        <h1>🏰 מבוך</h1>
        <input type="text" id="nin" placeholder="שם שחקן..." style="padding:10px;">
        <button onclick="join()" style="margin-top:10px; padding:10px; background:lime; border:none; cursor:pointer;">כניסה</button>
        <a href="https://docs.google.com/document/d/1V2dLYzytEPp-pj8lYusuTic1JNMxjCUr5TD_5PVWVbE/edit?usp=sharing" target="_blank" style="color:gold; margin-top:15px; font-weight:bold;">📜 חוקים</a>
    </div>

    <div id="status">
        <span>HP: <b id="hp">0</b>/5</span> 
        <span>כדורים: <b id="bul">3</b></span> 
        <span>פצצות: <b id="bom">3</b></span>
    </div>
    <div class="controls-hint">חיצים: תנועה | לחיצה שמאלית + חץ: ירייה | לחיצה ימנית + חץ: פצצה</div>
    
    <div id="board"></div>

    <script>
        const socket = io();
        let activeMouseType = "move";

        function join() { 
            const n = document.getElementById('nin').value; 
            if(n){ socket.emit('join',{name:n}); document.getElementById('welcome').style.display='none'; } 
        }

        // Disable right-click menu so we can use it for bombs
        window.oncontextmenu = (e) => e.preventDefault();

        window.onmousedown = (e) => {
            if (e.button === 0) activeMouseType = "shoot"; // Left Click
            else if (e.button === 2) activeMouseType = "bomb"; // Right Click
        };

        window.onmouseup = () => {
            activeMouseType = "move"; // Reset to movement when mouse is released
        };

        window.onkeydown = (e) => {
            const keys = {"ArrowUp":[0,-1], "ArrowDown":[0,1], "ArrowLeft":[-1,0], "ArrowRight":[1,0]};
            if(!keys[e.key]) return;
            
            // Send action based on what mouse button is currently held down
            socket.emit('action', {
                type: activeMouseType, 
                dx: keys[e.key][0], 
                dy: keys[e.key][1]
            });
        };

        socket.on('sync', d => {
            if(d.winner) { 
                document.getElementById('win').style.display='flex'; 
                document.getElementById('winner').innerText = d.winner; 
            }
            const b = document.getElementById('board'); b.innerHTML = '';
            const my = d.my_data;
            
            document.getElementById('hp').innerText = my.hp;
            document.getElementById('bul').innerText = my.bul;
            document.getElementById('bom').innerText = my.bom;
            
            for(let y=0; y<10; y++) {
                for(let x=0; x<10; x++) {
                    const c = document.createElement('div');
                    const known = my.known_tiles.some(t => t[0] === x && t[1] === y);
                    
                    if(d.is_spectator || (known && !my.is_lost)) {
                        const td = d.maze[y][x]; 
                        c.className = 'cell revealed';
                        if(td.walls.top) c.classList.add('wall-top');
                        if(td.walls.left) c.classList.add('wall-left');
                        if(td.tile !== "empty") c.style.backgroundImage = `url('/static/${td.tile}.png')`;
                    } else {
                        c.className = 'cell';
                    }
                    
                    if(d.phase === 2) c.onclick = () => socket.emit('set_spawn', {x, y});
                    
                    if(my.x === x && my.y === y && my.has_spawned) { 
                        const p = document.createElement('div'); 
                        p.className = 'p-self'; 
                        c.appendChild(p); 
                    }
                    b.appendChild(c);
                }
            }
        });
    </script>
</body>
</html>
