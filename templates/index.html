<!DOCTYPE html>
<html>
<head>
    <title>Maze Game</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <style>
        body { font-family: Arial; background: #f0f0f0; }

        #board {
            display: grid;
            grid-template-columns: repeat(10, 48px);
            gap: 2px;
            margin-top: 20px;
        }

        .cell {
            width: 48px;
            height: 48px;
            position: relative;
        }

        .cell img {
            width: 100%;
            height: 100%;
        }

        .player {
            position: absolute;
            bottom: 2px;
            right: 2px;
            font-size: 10px;
            background: black;
            color: white;
            padding: 2px 4px;
            border-radius: 6px;
        }

        .you {
            background: blue;
        }

        button { margin: 4px; }
    </style>
</head>
<body>

<h2>Maze Game</h2>

<input id="name" placeholder="Name">
<button onclick="join()">Join</button>

<br><br>

<button onclick="move('up')">⬆</button>
<button onclick="move('down')">⬇</button>
<button onclick="move('left')">⬅</button>
<button onclick="move('right')">➡</button>

<br>

<button onclick="shoot('up')">Shoot ⬆</button>
<button onclick="shoot('down')">Shoot ⬇</button>
<button onclick="shoot('left')">Shoot ⬅</button>
<button onclick="shoot('right')">Shoot ➡</button>

<br>

<button onclick="bomb('up')">Bomb ⬆</button>
<button onclick="bomb('down')">Bomb ⬇</button>
<button onclick="bomb('left')">Bomb ⬅</button>
<button onclick="bomb('right')">Bomb ➡</button>

<br>

<button onclick="flash('up')">Flash ⬆</button>
<button onclick="flash('down')">Flash ⬇</button>
<button onclick="flash('left')">Flash ⬅</button>
<button onclick="flash('right')">Flash ➡</button>

<h3 id="message"></h3>

<div id="board"></div>

<script>
const socket = io();
let state = null;

const textures = {
    empty: "empty.png",
    treasure: "treasure.png",
    fake_treasure: "fake_treasure.png",
    exit: "exit.png",
    river: "river.png",
    river_start: "river_start.png",
    boat: "boat.png",
    raft: "raft.png",
    clinic: "clinic.png",
    er: "er.png",
    monster: "monster.png",
    devil: "devil.png",
    black_hole: "black_hole.png",
    flashlight: "flashlight.png",
    batteries: "batteries.png",
    armory: "armory.png"
};

function join(){
    socket.emit("join_player", {name: document.getElementById("name").value});
}

function move(d){ socket.emit("player_move",{direction:d}); }
function shoot(d){ socket.emit("player_shoot",{direction:d}); }
function bomb(d){ socket.emit("player_bomb",{direction:d}); }
function flash(d){ socket.emit("player_flashlight",{direction:d}); }

socket.on("player_state", data=>{
    state = data;
    draw();
});

function draw(){
    const board = document.getElementById("board");
    board.innerHTML = "";

    const known = state.your_known_tiles;

    for(let y=0;y<10;y++){
        for(let x=0;x<10;x++){

            const key = `${x},${y}`;
            const tile = known[key] || "empty";

            const div = document.createElement("div");
            div.className = "cell";

            const img = document.createElement("img");

            let file = textures[tile] || "empty.png";
            img.src = "/static/" + file;

            div.appendChild(img);

            // show players
            state.all_players_public.forEach(p=>{
                if(p.x===x && p.y===y && p.alive){
                    const marker = document.createElement("div");
                    marker.className = "player";
                    if(p.sid === state.you.sid) marker.classList.add("you");
                    marker.innerText = p.name;
                    div.appendChild(marker);
                }
            });

            board.appendChild(div);
        }
    }

    document.getElementById("message").innerText = state.you.last_message;
}
</script>

</body>
</html>
