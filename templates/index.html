<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><title>מבוך</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        #board { display: grid; grid-template-columns: repeat(10, 50px); gap: 2px; margin: 20px auto; width: max-content; }
        .cell { width: 50px; height: 50px; background: #000; border: 1px solid #111; font-size: 10px; }
        .revealed { background: #333; border-color: #555; }
        .player { background: yellow; border-radius: 50%; width: 20px; height: 20px; margin: 15px; }
        #ping { color: cyan; font-weight: bold; height: 20px; }
    </style>
</head>
<body>
    <div id="ping"></div>
    <div id="board"></div>
    <script>
        const socket = io();
        socket.emit('join', {name: prompt("שם:")});
        window.onkeydown = (e) => {
            const keys = { "ArrowUp": [0,-1], "ArrowDown": [0,1], "ArrowLeft": [-1,0], "ArrowRight": [1,0] };
            if(keys[e.key]) socket.emit('action', { type: 'move', dx: keys[e.key][0], dy: keys[e.key][1] });
        };
        socket.on('relative_ping', d => { document.getElementById('ping').innerText = `${d.target_n} נמצא ב: ${d.dx}, ${d.dy}`; });
        socket.on('sync', d => {
            const my = d.my_data;
            const b = document.getElementById('board'); b.innerHTML = '';
            for(let y=0; y<10; y++){
                for(let x=0; x<10; x++){
                    const c = document.createElement('div');
                    const isKnown = my.known_tiles.some(t => t[0] === x && t[1] === y);
                    if(isKnown && !my.is_lost) {
                        c.className = 'cell revealed';
                        const t = d.maze_full[y][x].tile;
                        if(t !== "empty") c.innerText = t.substring(0,3);
                    } else { c.className = 'cell'; }
                    if(my.x === x && my.y === y) c.innerHTML = '<div class="player"></div>';
                    b.appendChild(c);
                }
            }
        });
    </script>
</body>
</html>
