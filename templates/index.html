<!DOCTYPE html>
<html id="html-tag" lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maze Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #welcome-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #board-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; direction: ltr !important; }
        #board { display: grid; grid-template-columns: repeat(10, 32px); gap: 1px; background: #333; padding: 4px; border-radius: 4px; }
        @media (min-width: 600px) { #board { grid-template-columns: repeat(10, 50px); } .cell { width: 50px !important; height: 50px !important; } }
        
        .cell { width: 32px; height: 32px; background: #111; position: relative; background-size: contain; box-sizing: border-box; cursor: pointer; border: 0.1px solid rgba(255,255,255,0.05); }
        .revealed { background: #333; }
        
        /* תיקון קירות - צל פנימי שלא יוצר underline */
        .wall-top { box-shadow: inset 0 5px 0 0 #ff4d4d !important; }
        .wall-left { box-shadow: inset 5px 0 0 0 #ff4d4d !important; }
        .wall-top.wall-left { box-shadow: inset 5px 5px 0 0 #ff4d4d !important; }

        .p-dot { width: 60%; height: 60%; background: cyan; border-radius: 50%; margin: 20%; border: 2px solid white; box-shadow: 0 0 10px cyan; }
        .active-turn { border: 2px solid #2ecc71; box-shadow: 0 0 15px #2ecc71; }
        
        #ui-panel { height: 180px; background: #222; display: flex; border-top: 2px solid #444; }
        #dpad { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 4px; padding: 10px; }
        .ctrl-btn { width: 50px; height: 50px; background: #444; border: none; color: white; border-radius: 8px; font-size: 20px; font-weight: bold; }
        .action-area { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; gap: 8px; padding: 10px; }
        .act-btn { width: 100%; height: 45px; background: #555; border: none; color: white; border-radius: 5px; font-weight: bold; font-size: 14px; }
        .mode-active { background: #f1c40f !important; color: #000; }
        .btn-rules { background: #3498db; text-decoration: none; display: inline-block; padding: 10px 20px; color: white; border-radius: 5px; margin-top: 10px; font-weight: bold; }
        #log-box { width: 120px; background: #000; font-size: 10px; padding: 5px; overflow-y: auto; color: #aaa; }
    </style>
</head>
<body>
    <button style="position:absolute; top:10px; left:10px; z-index:110;" onclick="toggleLang()">עברית/EN</button>

    <div id="welcome-overlay">
        <h2>מבוך משפחתי</h2>
        <input type="text" id="name-input" placeholder="הכנס שם..." style="padding:12px; border-radius:5px;"><br>
        <button onclick="joinGame()" style="padding:10px 20px; background:#2ecc71; color:white; border:none; border-radius:5px; margin-top:10px; font-weight:bold;">הצטרף</button><br>
        <a href="https://docs.google.com/document/d/1V2dLYzytEPp-pj8lYusuTic1JNMxjCUr5TD_5PVWVbE/edit" target="_blank" class="btn-rules">חוקי המשחק (Rules)</a>
    </div>

    <div id="status" style="display:flex; justify-content: space-around; padding: 10px; background: #111; border-bottom: 2px solid #333;">
        <div id="turn-txt" style="color: #2ecc71; font-weight: bold;">...</div>
        <div>❤️ <span id="inj">0</span>/5</div>
        <div>🔫 <span id="bul">3</span> | 💣 <span id="bom">3</span></div>
    </div>

    <div id="board-container"><div id="board"></div></div>

    <div id="ui-panel">
        <div id="dpad">
            <button class="ctrl-btn" style="grid-area: up" onclick="handleDir(0,-1)">↑</button>
            <button class="ctrl-btn" style="grid-area: left" onclick="handleDir(-1,0)">←</button>
            <button class="ctrl-btn" style="grid-area: right" onclick="handleDir(1,0)">→</button>
            <button class="ctrl-btn" style="grid-area: down" onclick="handleDir(0,1)">↓</button>
        </div>
        <div class="action-area">
            <button id="btn-shoot" class="act-btn" onclick="setMode('shoot')">SHOOT 🔫</button>
            <button id="btn-bomb" class="act-btn" onclick="setMode('bomb')">BOMB 💣</button>
        </div>
        <div id="log-box"></div>
    </div>

    <script>
        const socket = io();
        let lang = 'he', mode = 'move';

        function toggleLang() { lang = (lang === 'he' ? 'en' : 'he'); document.getElementById('html-tag').dir = (lang === 'he' ? 'rtl' : 'ltr'); }
        function joinGame() { socket.emit('join', { name: document.getElementById('name-input').value || "Explorer" }); document.getElementById('welcome-overlay').style.display = 'none'; }
        
        function setMode(m) {
            mode = (mode === m) ? 'move' : m;
            document.getElementById('btn-shoot').className = (mode === 'shoot') ? 'act-btn mode-active' : 'act-btn';
            document.getElementById('btn-bomb').className = (mode === 'bomb') ? 'act-btn mode-active' : 'act-btn';
        }

        function handleDir(dx, dy) {
            if(mode === 'move') socket.emit('move', {dx, dy});
            else if(mode === 'shoot') { socket.emit('shoot', {dx, dy}); setMode('move'); }
            else if(mode === 'bomb') { socket.emit('bomb', {dx, dy}); setMode('move'); }
        }

        socket.on('sync', d => {
            const my = d.players.find(p => p.id === socket.id); if(!my) return;
            document.getElementById('inj').innerText = my.injuries;
            document.getElementById('bul').innerText = my.bul;
            document.getElementById('bom').innerText = my.bom;
            
            const isTurn = (d.turn_id === socket.id);
            document.getElementById('turn-txt').innerText = isTurn ? "תורך!" : "ממתין...";
            document.getElementById('board').className = isTurn ? 'active-turn' : '';

            const hasVision = my.items.includes('flashlight') && my.items.includes('batteries');
            document.getElementById('log-box').innerHTML = d.logs.map(msg => `<div>${msg}</div>`).join('');

            const b = document.getElementById('board'); b.innerHTML = '';
            for(let y=0; y<10; y++) for(let x=0; x<10; x++) {
                const td = d.maze[y][x]; const cell = document.createElement('div');
                const known = hasVision || (my.known_tiles && my.known_tiles.some(t => t[0] === x && t[1] === y));
                cell.className = 'cell' + (known ? ' revealed' : '');
                if(known) {
                    if(td.walls.top) cell.classList.add('wall-top');
                    if(td.walls.left) cell.classList.add('wall-left');
                    if(td.tile !== "empty") cell.style.backgroundImage = `url('/static/${td.tile}.png')`;
                }
                if(my.x === x && my.y === y) { const dot = document.createElement('div'); dot.className = 'p-dot'; cell.appendChild(dot); }
                if(d.phase === 2 && !my.has_spawned) cell.onclick = () => socket.emit('set_spawn', {x, y});
                b.appendChild(cell);
            }
        });
    </script>
</body>
</html>
