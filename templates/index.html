<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>Maze Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .rtl { direction: rtl; } .ltr { direction: ltr; }
        #welcome-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #board { display: grid; grid-template-columns: repeat(10, 50px); gap: 1px; background: #333; padding: 5px; }
        .cell { width: 50px; height: 50px; background: #111; position: relative; background-size: contain; box-sizing: border-box; }
        .revealed { background: #444; }
        .wall-top { box-shadow: inset 0 5px 0 0 #ff4d4d; }
        .wall-left { box-shadow: inset 5px 0 0 0 #ff4d4d; }
        #log-box { flex-grow: 1; overflow-y: auto; background: #0a0a0a; padding: 10px; font-size: 13px; border: 1px solid #333; }
        .p-dot { width: 16px; height: 16px; background: cyan; border-radius: 50%; margin: 17px auto; border: 2px solid white; }
        .lang-btn { position: absolute; top: 10px; right: 10px; z-index: 110; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body id="b" class="rtl">
    <button class="lang-btn" onclick="toggleL()">EN / עב</button>

    <div id="welcome-overlay">
        <h1 id="t-welcome">מבוך</h1>
        <input type="text" id="name-input" placeholder="Name / שם" style="padding:10px;"><br>
        <button onclick="startGame()" style="padding:10px 20px; background:#2ecc71; color:white; border:none; border-radius:5px;">START / התחל</button>
    </div>

    <div style="display:flex; justify-content: space-around; padding: 10px; background: #111;">
        <div><span id="t-inj">פציעות</span>: <span id="inj">0</span>/5</div>
        <div><span id="t-bul">כדורים</span>: <span id="bul">3</span> | <span id="t-bom">פצצות</span>: <span id="bom">3</span></div>
    </div>

    <div style="display: flex; flex-grow: 1;">
        <div id="sidebar" style="width: 240px; display: flex; flex-direction: column; padding: 10px; border-left: 1px solid #333;">
            <div id="log-box"></div>
        </div>
        <div style="flex-grow: 1; display: flex; align-items: center; justify-content: center;">
            <div id="board"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let lang = 'he';
        const trans = {
            he: { welcome: "מבוך משפחתי", inj: "פציעות", bul: "כדורים", bom: "פצצות",
                LOG_RIVER_BOAT: " חצה את הנהר בבטחה.", LOG_RIVER_RAFT: " נסחף עם הרפסודה להתחלה.", LOG_RIVER_SWEEP: " נסחף ונפצע בנהר!",
                LOG_ARMORY: " מילא ציוד בנשקייה!", LOG_DEVIL: " פגש את השטן ואיבד ציוד!", LOG_MONSTER: " פגש מפלצת וקיבל תור וציוד!",
                LOG_PICKUP: " מצא: " },
            en: { welcome: "Family Maze", inj: "Injuries", bul: "Bullets", bom: "Bombs",
                LOG_RIVER_BOAT: " crossed the river safely.", LOG_RIVER_RAFT: " drifted back with the raft.", LOG_RIVER_SWEEP: " was swept and injured!",
                LOG_ARMORY: " restocked at the armory!", LOG_DEVIL: " met the Devil!", LOG_MONSTER: " met a monster!",
                LOG_PICKUP: " found: " }
        };

        function toggleL() {
            lang = (lang === 'he' ? 'en' : 'he');
            document.getElementById('b').className = (lang === 'he' ? 'rtl' : 'ltr');
            document.getElementById('t-inj').innerText = trans[lang].inj;
            document.getElementById('t-bul').innerText = trans[lang].bul;
            document.getElementById('t-bom').innerText = trans[lang].bom;
        }

        function startGame() {
            const name = document.getElementById('name-input').value || "Player";
            socket.emit('join', { name, is_man: false });
            document.getElementById('welcome-overlay').style.display = 'none';
        }

        socket.on('sync', d => {
            const my = d.players.find(p => p.id === socket.id); if(!my) return;
            document.getElementById('inj').innerText = my.injuries;
            document.getElementById('bul').innerText = my.bul;
            document.getElementById('bom').innerText = my.bom;
            
            // חוק פנס + סוללות: רואים הכל 
            const hasVision = my.items.includes('flashlight') && my.items.includes('batteries');
            
            document.getElementById('log-box').innerHTML = d.logs.map(l => `<div><b>${l.n}</b> ${trans[lang][l.key] || ''} ${l.i ? trans[lang].LOG_PICKUP + l.i : ''}</div>`).join('');
            
            const b = document.getElementById('board'); b.innerHTML = '';
            for(let y=0; y<10; y++) for(let x=0; x<10; x++) {
                const td = d.maze[y][x]; const cell = document.createElement('div');
                const known = hasVision || my.known_tiles.some(t => t[0] === x && t[1] === y);
                cell.className = 'cell' + (known ? ' revealed' : '');
                if(known) {
                    if(td.walls.top) cell.classList.add('wall-top');
                    if(td.walls.left) cell.classList.add('wall-left');
                    if(td.tile !== "empty") cell.style.backgroundImage = `url('/static/${td.tile}.png')`;
                }
                if(my.x === x && my.y === y) {
                    const dot = document.createElement('div'); dot.className = 'p-dot'; cell.appendChild(dot);
                }
                if(d.phase === 2 && !my.has_spawned) cell.onclick = () => socket.emit('set_spawn', {x,y});
                b.appendChild(cell);
            }
        });

        window.addEventListener('keydown', e => {
            const k = {ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0]};
            if(k[e.key]) socket.emit('move', {dx: k[e.key][0], dy: k[e.key][1]});
        });
    </script>
</body>
</html>
