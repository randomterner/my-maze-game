<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #board-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #111; direction: ltr; }
        #board { display: grid; grid-template-columns: repeat(10, 32px); gap: 1px; background: #444; }
        .cell { width: 32px; height: 32px; background: #000; position: relative; background-size: contain; box-sizing: border-box; }
        .revealed { background: #333; }
        .wall-top { box-shadow: inset 0 4px 0 0 #ff4d4d; }
        .wall-left { box-shadow: inset 4px 0 0 0 #ff4d4d; }
        .p-dot { width: 60%; height: 60%; background: cyan; border-radius: 50%; margin: 20%; border: 1px solid white; }
        
        #controls-ui { height: 180px; background: #222; display: flex; border-top: 2px solid #444; }
        #d-pad { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 5px; padding: 10px; }
        #actions { display: flex; flex-direction: column; justify-content: center; gap: 10px; padding: 10px; flex-grow: 1; }
        
        .btn { width: 50px; height: 50px; background: #444; border: none; color: white; border-radius: 8px; font-size: 20px; font-weight: bold; }
        .action-btn { width: 100%; height: 45px; background: #555; color: white; border: none; border-radius: 5px; font-size: 16px; }
        .active-mode { background: #f1c40f !important; color: #000; }
        #log-box { width: 150px; font-size: 10px; overflow-y: auto; padding: 5px; background: #000; }
    </style>
</head>
<body>
    <div id="status" style="display:flex; justify-content: space-around; padding: 10px; background: #111;">
        <div>❤️ <span id="inj">0</span></div>
        <div>🔫 <span id="bul">3</span></div>
        <div>💣 <span id="bom">3</span></div>
    </div>

    <div id="board-area"><div id="board"></div></div>

    <div id="controls-ui">
        <div id="d-pad">
            <button class="btn" style="grid-area: up" onclick="handleDir(0,-1)">↑</button>
            <button class="btn" style="grid-area: left" onclick="handleDir(-1,0)">←</button>
            <button class="btn" style="grid-area: right" onclick="handleDir(1,0)">→</button>
            <button class="btn" style="grid-area: down" onclick="handleDir(0,1)">↓</button>
        </div>
        <div id="actions">
            <button id="shoot-btn" class="action-btn" onclick="setMode('shoot')">SHOOT 🔫</button>
            <button id="bomb-btn" class="action-btn" onclick="setMode('bomb')">BOMB 💣</button>
        </div>
        <div id="log-box"></div>
    </div>

    <script>
        const socket = io();
        let actionMode = 'move'; // 'move', 'shoot', 'bomb'

        function setMode(m) {
            actionMode = (actionMode === m) ? 'move' : m;
            document.getElementById('shoot-btn').className = (actionMode === 'shoot') ? 'action-btn active-mode' : 'action-btn';
            document.getElementById('bomb-btn').className = (actionMode === 'bomb') ? 'action-btn active-mode' : 'action-btn';
        }

        function handleDir(dx, dy) {
            if (actionMode === 'move') socket.emit('move', {dx, dy});
            else if (actionMode === 'shoot') { socket.emit('shoot', {dx, dy}); setMode('move'); }
            else if (actionMode === 'bomb') { socket.emit('bomb', {dx, dy}); setMode('move'); }
        }

        socket.on('sync', d => {
            const my = d.players.find(p => p.id === socket.id); if(!my) return;
            document.getElementById('inj').innerText = my.injuries;
            document.getElementById('bul').innerText = my.bul;
            document.getElementById('bom').innerText = my.bom;
            document.getElementById('log-box').innerHTML = d.logs.map(l => `<div>${l.n}: ${l.key}</div>`).join('');
            
            const b = document.getElementById('board'); b.innerHTML = '';
            for(let y=0; y<10; y++) for(let x=0; x<10; x++) {
                const td = d.maze[y][x]; const cell = document.createElement('div');
                const known = my.known_tiles && my.known_tiles.some(t => t[0] === x && t[1] === y);
                cell.className = 'cell' + (known ? ' revealed' : '');
                if(known) {
                    if(td.walls.top) cell.classList.add('wall-top');
                    if(td.walls.left) cell.classList.add('wall-left');
                    if(td.tile !== 'empty') cell.style.backgroundImage = `url('/static/${td.tile}.png')`;
                }
                if(my.x === x && my.y === y) {
                    const dot = document.createElement('div'); dot.className = 'p-dot'; cell.appendChild(dot);
                }
                b.appendChild(cell);
            }
        });
        socket.emit('join', {name: "Explorer"});
    </script>
</body>
</html>
