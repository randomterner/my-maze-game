<!DOCTYPE html>
<html id="html-tag" lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maze Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #welcome-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #main-layout { display: flex; flex-grow: 1; overflow: hidden; }
        #inventory { width: 140px; background: #111; border-left: 2px solid #333; padding: 10px; font-size: 12px; }
        #logs { width: 180px; background: #111; border-right: 2px solid #333; padding: 10px; font-size: 11px; overflow-y: auto; color: #ccc; }
        #board-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; direction: ltr !important; }
        #board { display: grid; grid-template-columns: repeat(10, 32px); gap: 1px; background: #333; padding: 4px; }
        @media (min-width: 700px) { #board { grid-template-columns: repeat(10, 50px); } .cell { width: 50px !important; height: 50px !important; } }
        .cell { width: 32px; height: 32px; background: #111; position: relative; background-size: contain; box-sizing: border-box; }
        .revealed { background: #333; }
        .wall-top { box-shadow: inset 0 5px 0 0 #ff4d4d; }
        .wall-left { box-shadow: inset 5px 0 0 0 #ff4d4d; }
        .p-dot { width: 60%; height: 60%; background: cyan; border-radius: 50%; margin: 20%; border: 2px solid white; box-shadow: 0 0 10px cyan; }
        .active-turn { border: 2px solid #2ecc71; box-shadow: 0 0 15px #2ecc71; }
        #ui { height: 170px; background: #222; display: flex; border-top: 2px solid #444; }
        .dpad { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 4px; padding: 10px; }
        .btn { width: 45px; height: 45px; background: #444; border: none; color: white; border-radius: 8px; font-size: 18px; }
        .act-btn { height: 40px; background: #555; color: white; border: none; border-radius: 5px; font-weight: bold; width: 100%; margin-bottom: 5px; }
        .mode-on { background: #f1c40f !important; color: #000; }
    </style>
</head>
<body>
    <div id="welcome-overlay">
        <h2>מבוך משפחתי</h2>
        <input type="text" id="nin" placeholder="שם..."><br>
        <button onclick="join()" style="padding:10px 20px; background:#2ecc71; color:white; border:none; border-radius:5px;">START</button>
    </div>
    <div id="status" style="display:flex; justify-content: space-around; padding: 10px; background: #111; border-bottom: 2px solid #333;">
        <div id="turn-display" style="color: #2ecc71;">ממתין...</div>
        <div>❤️ <span id="inj-val">0</span>/5</div>
        <div>🔫 <span id="bul-val">3</span> | 💣 <span id="bom-val">3</span></div>
    </div>
    <div id="main-layout">
        <div id="inventory"><b>🎒 תיק:</b><div id="inv-items"></div></div>
        <div id="board-area"><div id="board"></div></div>
        <div id="logs"><b>📜 יומן:</b><div id="log-content"></div></div>
    </div>
    <div id="ui">
        <div class="dpad">
            <button class="btn" style="grid-area: up" onclick="dir(0,-1)">↑</button>
            <button class="btn" style="grid-area: left" onclick="dir(-1,0)">←</button>
            <button class="btn" style="grid-area: right" onclick="dir(1,0)">→</button>
            <button class="btn" style="grid-area: down" onclick="dir(0,1)">↓</button>
        </div>
        <div style="flex-grow:1; padding:10px;">
            <button id="s-btn" class="act-btn" onclick="setM('shoot')">SHOOT 🔫</button>
            <button id="b-btn" class="act-btn" onclick="setM('bomb')">BOMB 💣</button>
        </div>
    </div>
    <script>
        const socket = io(); let m = 'move';
        function join() { socket.emit('join', { name: document.getElementById('nin').value || "Explorer" }); document.getElementById('welcome-overlay').style.display = 'none'; }
        function setM(mode) { m = (m === mode) ? 'move' : mode; document.getElementById('s-btn').className = (m==='shoot')?'act-btn mode-on':'act-btn'; document.getElementById('b-btn').className = (m==='bomb')?'act-btn mode-on':'act-btn'; }
        function dir(dx, dy) { if(m==='move') socket.emit('move',{dx,dy}); else if(m==='shoot'){ socket.emit('shoot',{dx,dy}); setM('move'); } else { socket.emit('bomb',{dx,dy}); setM('move'); } }
        socket.on('sync', d => {
            const my = d.players.find(p => p.id === socket.id); if(!my) return;
            if(d.winner) alert("המנצח: " + d.winner);
            document.getElementById('inj-val').innerText = my.injuries;
            document.getElementById('bul-val').innerText = my.bul; document.getElementById('bom-val').innerText = my.bom;
            document.getElementById('turn-display').innerText = (d.turn_id === socket.id) ? "תורך!" : "ממתין לתור...";
            document.getElementById('inv-items').innerHTML = my.items.map(i => `<div>- ${i}</div>`).join('');
            document.getElementById('log-content').innerHTML = d.logs.map(l => `<div>${l}</div>`).join('');
            const b = document.getElementById('board'); b.innerHTML = '';
            const vision = my.items.includes('flashlight') && my.items.includes('batteries');
            for(let y=0; y<10; y++) for(let x=0; x<10; x++) {
                const td = d.maze[y][x]; const c = document.createElement('div');
                const known = vision || my.known_tiles.some(t => t[0] === x && t[1] === y);
                c.className = 'cell' + (known ? ' revealed' : '');
                if(known) {
                    if(td.walls.top) c.classList.add('wall-top'); if(td.walls.left) c.classList.add('wall-left');
                    if(td.tile !== "empty") c.style.backgroundImage = `url('/static/${td.tile}.png')`;
                }
                if(my.x === x && my.y === y) { const dot = document.createElement('div'); dot.className = 'p-dot'; c.appendChild(dot); }
                if(d.phase === 2 && !my.has_spawned) c.onclick = () => socket.emit('set_spawn', {x, y});
                b.appendChild(c);
            }
        });
    </script>
</body>
</html>
