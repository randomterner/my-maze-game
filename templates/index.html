<!DOCTYPE html>
<html id="html-tag" lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze RPG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #welcome-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #main-container { display: flex; flex-grow: 1; overflow: hidden; }
        
        /* Sidebar Styles */
        #left-sidebar { width: 200px; background: #111; border-left: 2px solid #333; display: flex; flex-direction: column; padding: 10px; }
        #right-sidebar { width: 200px; background: #111; border-right: 2px solid #333; display: flex; flex-direction: column; padding: 10px; }
        
        #board-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #000; direction: ltr !important; }
        #board { display: grid; grid-template-columns: repeat(10, 35px); gap: 1px; background: #333; padding: 5px; }
        @media (min-width: 800px) { #board { grid-template-columns: repeat(10, 55px); } .cell { width: 55px !important; height: 55px !important; } }
        
        .cell { width: 35px; height: 35px; background: #111; position: relative; background-size: contain; box-sizing: border-box; }
        .revealed { background: #333; }
        .wall-top { box-shadow: inset 0 5px 0 0 #ff4d4d; }
        .wall-left { box-shadow: inset 5px 0 0 0 #ff4d4d; }
        
        .inv-item { background: #222; border: 1px solid #444; margin: 2px 0; padding: 5px; font-size: 12px; border-radius: 4px; }
        #log-box { flex-grow: 1; overflow-y: auto; font-size: 11px; color: #ccc; }
        
        .p-dot { width: 60%; height: 60%; background: cyan; border-radius: 50%; margin: 20%; border: 2px solid white; }
        .active-turn { border: 2px solid #2ecc71; box-shadow: 0 0 15px #2ecc71; }
        
        #controls { height: 160px; background: #1a1a1a; display: flex; border-top: 2px solid #333; }
        .dpad { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 5px; padding: 10px; }
        .ctrl-btn { width: 45px; height: 45px; background: #444; border: none; color: white; border-radius: 8px; font-size: 18px; }
        .action-btns { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; gap: 10px; padding: 10px; }
        .act-btn { height: 40px; background: #555; color: white; border: none; border-radius: 5px; font-weight: bold; }
        .active-mode { background: #f1c40f !important; color: #000; }
    </style>
</head>
<body>
    <div id="welcome-overlay">
        <h1>מבוך משפחתי</h1>
        <input type="text" id="name-input" placeholder="שם..." style="padding:10px;"><br>
        <button onclick="joinGame()" style="padding:10px 20px; background:#2ecc71; border:none; color:white;">כניסה</button>
    </div>

    <div id="status" style="display:flex; justify-content: space-around; padding: 10px; background: #111; border-bottom: 2px solid #333;">
        <div id="turn-txt" style="color:#2ecc71;">ממתין...</div>
        <div>❤️ <span id="inj">0</span>/5</div>
        <div>🔫 <span id="bul">3</span> | 💣 <span id="bom">3</span></div>
    </div>

    <div id="main-container">
        <div id="left-sidebar">
            <h4>🎒 מלאי (Inventory)</h4>
            <div id="inventory-list"></div>
        </div>

        <div id="board-area"><div id="board"></div></div>

        <div id="right-sidebar">
            <h4>📜 יומן פעילויות</h4>
            <div id="log-box"></div>
        </div>
    </div>

    <div id="controls">
        <div class="dpad">
            <button class="ctrl-btn" style="grid-area: up" onclick="handleDir(0,-1)">↑</button>
            <button class="ctrl-btn" style="grid-area: left" onclick="handleDir(-1,0)">←</button>
            <button class="ctrl-btn" style="grid-area: right" onclick="handleDir(1,0)">→</button>
            <button class="ctrl-btn" style="grid-area: down" onclick="handleDir(0,1)">↓</button>
        </div>
        <div class="action-btns">
            <button id="shoot-btn" class="act-btn" onclick="setMode('shoot')">SHOOT 🔫</button>
            <button id="bomb-btn" class="act-btn" onclick="setMode('bomb')">BOMB 💣</button>
        </div>
    </div>

    <script>
        const socket = io();
        let mode = 'move';

        function joinGame() { socket.emit('join', {name: document.getElementById('name-input').value}); document.getElementById('welcome-overlay').style.display='none'; }
        function setMode(m) {
            mode = (mode === m) ? 'move' : m;
            document.getElementById('shoot-btn').className = (mode === 'shoot') ? 'act-btn active-mode' : 'act-btn';
            document.getElementById('bomb-btn').className = (mode === 'bomb') ? 'act-btn active-mode' : 'act-btn';
        }
        function handleDir(dx, dy) {
            if(mode === 'move') socket.emit('move', {dx, dy});
            else if(mode === 'shoot') { socket.emit('shoot', {dx, dy}); setMode('move'); }
            else if(mode === 'bomb') { socket.emit('bomb', {dx, dy}); setMode('move'); }
        }

        socket.on('sync', d => {
            const my = d.players.find(p => p.id === socket.id); if(!my) return;
            if(d.winner) alert("המשחק נגמר! המנצח: " + d.winner);

            document.getElementById('inj').innerText = my.injuries;
            document.getElementById('bul').innerText = my.bul;
            document.getElementById('bom').innerText = my.bom;
            document.getElementById('turn-txt').innerText = (d.turn_id === socket.id) ? "תורך!" : "ממתין לתור...";
            
            // עדכון מלאי
            document.getElementById('inventory-list').innerHTML = my.items.map(i => `<div class="inv-item">📦 ${i}</div>`).join('');
            
            // עדכון לוג
            document.getElementById('log-box').innerHTML = d.logs.map(m => `<div>${m}</div>`).join('');

            const b = document.getElementById('board'); b.innerHTML = '';
            const hasVision = my.items.includes('flashlight') && my.items.includes('batteries');

            for(let y=0; y<10; y++) for(let x=0; x<10; x++) {
                const td = d.maze[y][x]; const cell = document.createElement('div');
                const known = hasVision || my.known_tiles.some(t => t[0] === x && t[1] === y);
                cell.className = 'cell' + (known ? ' revealed' : '');
                if(known) {
                    if(td.walls.top) cell.classList.add('wall-top');
                    if(td.walls.left) cell.classList.add('wall-left');
                    if(td.tile !== "empty") cell.style.backgroundImage = `url('/static/${td.tile}.png')`;
                }
                if(my.x === x && my.y === y) { const dot = document.createElement('div'); dot.className='p-dot'; cell.appendChild(dot); }
                if(d.phase === 2 && !my.has_spawned) cell.onclick = () => socket.emit('set_spawn', {x,y});
                b.appendChild(cell);
            }
        });
    </script>
</body>
</html>
