<!DOCTYPE html>
<html id="html-tag" lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><title>Maze Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #welcome-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #board { display: grid; grid-template-columns: repeat(10, 50px); gap: 1px; background: #333; padding: 5px; }
        .cell { width: 50px; height: 50px; background: #111; position: relative; background-size: contain; box-sizing: border-box; }
        .revealed { background: #444; }
        .wall-top { box-shadow: inset 0 5px 0 0 #ff4d4d; }
        .wall-left { box-shadow: inset 5px 0 0 0 #ff4d4d; }
        #log-box { flex-grow: 1; overflow-y: auto; background: #0a0a0a; padding: 10px; font-size: 13px; border: 1px solid #333; }
        .p-dot { width: 16px; height: 16px; background: cyan; border-radius: 50%; margin: 17px auto; border: 2px solid white; box-shadow: 0 0 10px cyan; }
        .btn { padding: 12px 25px; cursor: pointer; border: none; color: white; border-radius: 5px; font-weight: bold; margin: 5px; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <button style="position:absolute; top:10px; left:10px; z-index:110;" onclick="toggleLang()">עברית/English</button>
    <div id="welcome-overlay">
        <h1 id="t-welcome">מבוך משפחתי</h1>
        <input type="text" id="name-input" placeholder="שם / Name" style="padding: 12px; font-size: 18px; margin-bottom: 10px;"><br>
        <button class="btn" style="background:#2ecc71;" id="t-start" onclick="joinGame()">הצטרף</button><br>
        <a href="https://docs.google.com/document/d/1V2dLYzytEPp-pj8lYusuTic1JNMxjCUr5TD_5PVWVbE/edit" target="_blank" class="btn" style="background:#3498db;" id="t-rules">חוקי המשחק</a>
    </div>
    <div id="status" style="display:flex; justify-content: space-around; padding: 10px; background: #111; border-bottom: 2px solid #333;">
        <div><span id="t-inj">פציעות</span>: <span id="inj">0</span>/5</div>
        <div><span id="t-bul">כדורים</span>: <span id="bul">3</span> | <span id="t-bom">פצצות</span>: <span id="bom">3</span></div>
        <div id="vision-on" style="color:yellow; display:none;">🔦</div>
    </div>
    <div style="display: flex; flex-grow: 1;">
        <div id="sidebar" style="width: 250px; display: flex; flex-direction: column; padding: 10px; border-left: 1px solid #333;">
            <div id="log-box"></div>
        </div>
        <div style="flex-grow: 1; display: flex; align-items: center; justify-content: center;"><div id="board"></div></div>
    </div>
    <script>
        const socket = io(); let lang = 'he';
        const trans = {
            he: { welcome: "מבוך משפחתי", start: "הצטרף", rules: "חוקים", inj: "פציעות", bul: "כדורים", bom: "פצצות", pickup: "מצא: ", river_sweep: "נסחף בנהר!", river_raft: "נסחף אך מוגן ע\"י רפסודה", devil: "פגש את השטן!", armory: "מילא ציוד בנשקייה!", monster: "פגש מפלצת!" },
            en: { welcome: "Family Maze", start: "Join", rules: "Rules", inj: "Injuries", bul: "Bullets", bom: "Bombs", pickup: "Found: ", river_sweep: "Swept by river!", river_raft: "Drifted but safe (Raft)", devil: "Met the Devil!", armory: "Restocked at Armory!", monster: "Met a monster!" }
        };
        function toggleLang() {
            lang = (lang === 'he' ? 'en' : 'he'); document.getElementById('html-tag').dir = (lang === 'he' ? 'rtl' : 'ltr');
            ['t-welcome','t-start','t-rules','t-inj','t-bul','t-bom'].forEach(id => document.getElementById(id).innerText = trans[lang][id.replace('t-','')]);
        }
        function joinGame() { socket.emit('join', { name: document.getElementById('name-input').value || "Explorer", is_man: false }); document.getElementById('welcome-overlay').style.display = 'none'; }
        socket.on('sync', d => {
            const my = d.players.find(p => p.id === socket.id); if(!my) return;
            document.getElementById('inj').innerText = my.injuries; document.getElementById('bul').innerText = my.bul; document.getElementById('bom').innerText = my.bom;
            const hasVision = my.items.includes('flashlight') && my.items.includes('batteries');
            document.getElementById('vision-on').style.display = hasVision ? 'block' : 'none';
            document.getElementById('log-box').innerHTML = d.logs.map(l => {
                let key = l.key.replace('LOG_','').toLowerCase();
                return `<div><b>${l.n}</b> ${trans[lang][key] || l.key} ${l.e ? trans[lang].pickup + l.e : ""}</div>`;
            }).join('');
            const b = document.getElementById('board'); b.innerHTML = '';
            for(let y=0; y<10; y++) for(let x=0; x<10; x++) {
                const td = d.maze[y][x]; const cell = document.createElement('div');
                const isKnown = hasVision || my.known_tiles.some(t => t[0] === x && t[1] === y);
                cell.className = 'cell' + (isKnown ? ' revealed' : '');
                if(isKnown) {
                    if(td.walls.top) cell.classList.add('wall-top'); if(td.walls.left) cell.classList.add('wall-left');
                    if(td.tile !== "empty") cell.style.backgroundImage = `url('/static/${td.tile}.png')`;
                }
                if(my.x === x && my.y === y) { const dot = document.createElement('div'); dot.className = 'p-dot'; cell.appendChild(dot); }
                if(d.phase === 2 && !my.has_spawned) cell.onclick = () => socket.emit('set_spawn', {x, y});
                b.appendChild(cell);
            }
        });
        window.addEventListener('keydown', e => {
            const k = {ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0]};
            if(k[e.key]) socket.emit('move', {dx: k[e.key][0], dy: k[e.key][1]});
        });
    </script>
</body>
</html>
