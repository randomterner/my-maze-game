<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מנחה - עורך מבוך</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { display: flex; font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; height: 100vh; }
        #sidebar { width: 250px; padding: 15px; background: #222; border-left: 2px solid #444; overflow-y: auto; }
        #grid-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #111; }
        #grid { display: grid; grid-template-columns: repeat(10, 50px); gap: 2px; background: #444; border: 2px solid #555; }
        .cell { width: 50px; height: 50px; background: #fff; border: 1px solid #ccc; position: relative; color: black; font-size: 10px; display: flex; align-items: center; justify-content: center; cursor: crosshair; }
        .wall-top { border-top: 6px solid red !important; }
        .wall-left { border-left: 6px solid red !important; }
        .opt { padding: 8px; margin: 3px 0; background: #333; cursor: pointer; border: 1px solid #555; text-align: center; border-radius: 4px; }
        .selected { background: #007bff !important; border-color: white; }
        button { padding: 12px; margin-top: 20px; width: 100%; cursor: pointer; background: #28a745; color: white; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>בחירת אריח</h3>
        <div id="opts-container"></div>
        <button id="start-btn" onclick="sendStart()">שמור והתחל משחק 🚀</button>
    </div>
    <div id="grid-container">
        <div id="grid"></div>
    </div>

    <script>
        // Use empty string for auto-discovery of the URL on Render
        const socket = io();
        let selectedTile = "empty";
        let maze = Array(10).fill().map(() => Array(10).fill().map(() => ({tile: "empty", walls: {top: false, left: false}})));

        const tileTypes = ["empty", "treasure", "fake_treasure", "exit", "black_hole", "river", "devil", "clinic", "er", "armory", "monster", "boat", "raft", "flashlight", "batteries"];
        
        // Build Sidebar
        const optDiv = document.getElementById('opts-container');
        tileTypes.forEach(t => {
            const d = document.createElement('div');
            d.className = 'opt' + (t === selectedTile ? ' selected' : '');
            d.innerText = t;
            d.onclick = () => {
                document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
                d.classList.add('selected');
                selectedTile = t;
            };
            optDiv.appendChild(d);
        });

        // Build Grid
        const gridElement = document.getElementById('grid');
        for(let y=0; y<10; y++){
            for(let x=0; x<10; x++){
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${x}-${y}`;
                cell.oncontextmenu = (e) => e.preventDefault();
                cell.onmousedown = (e) => {
                    const rect = cell.getBoundingClientRect();
                    if(e.button === 0) maze[y][x].tile = selectedTile;
                    else if(e.button === 2) {
                        if(e.clientY - rect.top < 15) maze[y][x].walls.top = !maze[y][x].walls.top;
                        else if(e.clientX - rect.left < 15) maze[y][x].walls.left = !maze[y][x].walls.left;
                    }
                    else if(e.button === 1) { maze[y][x].tile = "empty"; maze[y][x].walls.top = false; maze[y][x].walls.left = false; }
                    
                    refreshUI();
                    socket.emit('save_maze', { maze: maze });
                };
                gridElement.appendChild(cell);
            }
        }

        function refreshUI() {
            for(let y=0; y<10; y++){
                for(let x=0; x<10; x++){
                    const cell = document.getElementById(`cell-${x}-${y}`);
                    const data = maze[y][x];
                    cell.className = 'cell ' + (data.walls.top ? 'wall-top ' : '') + (data.walls.left ? 'wall-left' : '');
                    cell.innerText = data.tile === "empty" ? "" : data.tile.substring(0,3);
                }
            }
        }

        function sendStart() { socket.emit('start_trigger'); alert("המשחק התחיל!"); }
        refreshUI();
    </script>
</body>
</html>
