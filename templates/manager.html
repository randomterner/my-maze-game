<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager - Host</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { display: flex; background: #1a1a1a; color: white; margin: 0; font-family: sans-serif; height: 100vh; flex-direction: column; }
        #sidebar { background: #222; border-bottom: 2px solid #444; padding: 10px; display: flex; gap: 8px; overflow-x: auto; }
        #main-area { display: flex; flex-grow: 1; overflow: hidden; }
        #host-logs { width: 220px; background: #111; border-right: 2px solid #444; padding: 10px; overflow-y: auto; font-size: 11px; color: #0f0; }
        #grid-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; direction: ltr !important; }
        #grid { display: grid; grid-template-columns: repeat(10, 32px); gap: 1px; background: #444; }
        @media (min-width: 600px) { #grid { grid-template-columns: repeat(10, 45px); } .cell { width: 45px !important; height: 45px !important; } }
        .cell { width: 32px; height: 32px; background: #fff; position: relative; background-size: contain; box-sizing: border-box; cursor: pointer; }
        
        .wall-top { box-shadow: inset 0 5px 0 0 #ff4d4d; }
        .wall-left { box-shadow: inset 5px 0 0 0 #ff4d4d; }
        .wall-top.wall-left { box-shadow: inset 5px 0 0 0 #ff4d4d, inset 0 5px 0 0 #ff4d4d !important; }

        .tile-opt { min-width: 80px; padding: 6px; background: #333; border-radius: 4px; text-align: center; font-size: 11px; flex-shrink: 0; border: 1px solid #555; }
        .selected { border: 2px solid #2ecc71; background: #1e5631; }
        .p-dot { width: 14px; height: 14px; background: #00ffff; border-radius: 50%; position: absolute; top: 10px; left: 10px; border: 1px solid black; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="sidebar">
        <div class="tile-opt selected" onclick="sel('empty', this)">רצפה</div>
        <div class="tile-opt" onclick="sel('treasure', this)">💰 Treasure</div>
        <div class="tile-opt" onclick="sel('fake_treasure', this)">💎 Fake</div>
        <div class="tile-opt" onclick="sel('armory', this)">⚔️ נשקייה</div>
        <div class="tile-opt" onclick="sel('monster', this)">👾 מפלצת</div>
        <div class="tile-opt" onclick="sel('devil', this)">😈 שטן</div>
        <div class="tile-opt" onclick="sel('river', this)">💧 נהר</div>
        <div class="tile-opt" onclick="sel('river_start', this)">🌊 התחלה</div>
        <div class="tile-opt" onclick="sel('boat', this)">🛶 סירה</div>
        <div class="tile-opt" onclick="sel('raft', this)">🪵 רפסודה</div>
        <div class="tile-opt" onclick="sel('flashlight', this)">🔦 פנס</div>
        <div class="tile-opt" onclick="sel('batteries', this)">🔋 סוללות</div>
        <div class="tile-opt" onclick="sel('clinic', this)">🏥 מרפאה</div>
        <div class="tile-opt" onclick="sel('er', this)">🚑 מיון</div>
        <div class="tile-opt" onclick="sel('black_hole', this)">🕳️ חור שחור</div>
        <div class="tile-opt" onclick="sel('exit', this)">🚪 יציאה</div>
    </div>
    <div id="main-area">
        <div id="host-logs"><b>📜 יומן מנחה:</b><div id="log-list"></div></div>
        <div id="grid-area"><div id="grid"></div></div>
    </div>
    <div style="padding:10px; background:#222; display:flex; gap:10px; justify-content:center;">
        <button style="padding:10px; background:#e67e22; color:white; border:none; border-radius:5px;" onclick="socket.emit('set_phase', 2)">Set Spawn</button>
        <button style="padding:10px; background:#2ecc71; color:white; border:none; border-radius:5px;" onclick="socket.emit('set_phase', 3)">START</button>
        <button style="padding:10px; background:#3498db; color:white; border:none; border-radius:5px;" onclick="socket.emit('next_turn')">תור הבא ➡️</button>
    </div>
    <script>
        const socket = io(); let curS = "empty"; let mazeD = [], phase = 1;
        function sel(t, e) { curS = t; document.querySelectorAll('.tile-opt').forEach(o => o.classList.remove('selected')); e.classList.add('selected'); }
        socket.on('sync', d => {
            mazeD = d.maze; phase = d.phase;
            document.getElementById('log-list').innerHTML = d.logs.map(l => `<div>- ${l}</div>`).join('');
            const g = document.getElementById('grid'); g.innerHTML = '';
            for(let y=0; y<10; y++) for(let x=0; x<10; x++) {
                const td = d.maze[y][x]; const c = document.createElement('div'); c.className = 'cell';
                if(td.walls.top) c.classList.add('wall-top'); if(td.walls.left) c.classList.add('wall-left');
                if(td.tile !== "empty") c.style.backgroundImage = `url('/static/${td.tile}.png')`;
                d.players.forEach(p => { if(p.x === x && p.y === y) { const dot=document.createElement('div'); dot.className='p-dot'; c.appendChild(dot); } });
                c.onmousedown = (e) => {
                    if (phase !== 1) return;
                    const r = c.getBoundingClientRect();
                    if (e.button === 0) mazeD[y][x].tile = curS;
                    else if (e.button === 2) {
                        if (e.clientY - r.top < 12) mazeD[y][x].walls.top = !mazeD[y][x].walls.top;
                        else if (e.clientX - r.left < 12) mazeD[y][x].walls.left = !mazeD[y][x].walls.left;
                    }
                    socket.emit('update_maze', mazeD);
                };
                g.appendChild(c);
            }
        });
        socket.emit('join', { name: "Host", is_man: true });
    </script>
</body>
</html>
