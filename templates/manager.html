<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><title>מנחה - מבוך</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { display: flex; background: #1a1a1a; color: white; margin: 0; font-family: sans-serif; }
        #sidebar { width: 240px; background: #222; padding: 15px; border-left: 1px solid #444; height: 100vh; }
        #grid { display: grid; grid-template-columns: repeat(10, 50px); gap: 2px; padding: 20px; }
        .cell { width: 50px; height: 50px; background: #fff; border: 1px solid #ccc; color: black; font-size: 10px; display: flex; align-items: center; justify-content: center; position: relative; }
        .wall-top { border-top: 5px solid red; }
        .wall-left { border-left: 5px solid red; }
        .player-marker { position: absolute; width: 12px; height: 12px; background: blue; border-radius: 50%; border: 1px solid white; z-index: 10; }
        .btn { width: 100%; padding: 10px; margin: 5px 0; cursor: pointer; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>מנחה: שלב <span id="phase-num">1</span></h3>
        <button class="btn" onclick="socket.emit('set_phase',{phase:1})">1. בנייה</button>
        <button class="btn" onclick="socket.emit('set_phase',{phase:2})">2. הולדה</button>
        <button class="btn" onclick="socket.emit('set_phase',{phase:3})" style="background:lime">3. התחל!</button>
        <div id="lock-notice" style="color:red; display:none; font-weight:bold;">הלוח נעול - המשחק רץ</div>
        <hr><div id="opts"></div>
    </div>
    <div id="grid"></div>

    <script>
        const socket = io();
        let sel = "empty", maze = [];
        
        socket.on('sync', d => {
            maze = d.maze;
            document.getElementById('phase-num').innerText = d.phase;
            document.getElementById('lock-notice').style.display = d.phase >= 3 ? 'block' : 'none';
            
            const g = document.getElementById('grid'); g.innerHTML = '';
            for(let y=0; y<10; y++){
                for(let x=0; x<10; x++){
                    const c = document.createElement('div');
                    const td = maze[y][x];
                    c.className = 'cell ' + (td.walls.top ? 'wall-top ' : '') + (td.walls.left ? 'wall-left' : '');
                    c.innerText = td.tile.substring(0,3);
                    
                    // Show players to Manager
                    d.players.forEach(p => {
                        if(p.x === x && p.y === y && !p.dead) {
                            const m = document.createElement('div');
                            m.className = 'player-marker'; m.title = p.n;
                            c.appendChild(m);
                        }
                    });

                    c.onclick = () => { if(d.phase < 3) { maze[y][x].tile = sel; socket.emit('save_maze', {maze}); } };
                    g.appendChild(c);
                }
            }
        });
    </script>
</body>
</html>
