<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><title>Host Monitor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #sidebar { background: #222; padding: 10px; display: flex; gap: 5px; overflow-x: auto; }
        #grid { display: grid; grid-template-columns: repeat(10, 50px); gap: 1px; background: #444; margin: auto; }
        .cell { width: 50px; height: 50px; background: #fff; position: relative; background-size: contain; border: 1px solid #ccc; cursor: pointer; }
        .wall-top { border-top: 5px solid red; }
        .wall-left { border-left: 5px solid red; }
        .opt { padding: 5px; background: #444; color: #fff; cursor: pointer; border: 1px solid #666; font-size: 11px; white-space: nowrap; }
        .sel { background: cyan; color: #000; }
    </style>
</head>
<body>
    <div id="sidebar">
        <button class="opt sel" onclick="sel('empty',this)">Floor</button>
        <button class="opt" onclick="sel('treasure',this)">💰 Treasure</button>
        <button class="opt" onclick="sel('fake_treasure',this)">💎 Fake</button>
        <button class="opt" onclick="sel('river',this)">💧 River</button>
        <button class="opt" onclick="sel('river_start',this)">🌊 Start</button>
        <button class="opt" onclick="sel('boat',this)">🛶 Boat</button>
        <button class="opt" onclick="sel('raft',this)">🪵 Raft</button>
        <button class="opt" onclick="sel('flashlight',this)">🔦 Flashlight</button>
        <button class="opt" onclick="sel('batteries',this)">🔋 Batteries</button>
        <button class="opt" onclick="sel('exit',this)">🚪 Exit</button>
        <button class="opt" onclick="sel('monster',this)">👾 Monster</button>
        <button class="opt" onclick="sel('devil',this)">😈 Devil</button>
        <button class="opt" onclick="sel('clinic',this)">🏥 Clinic</button>
        <button class="opt" onclick="sel('er',this)">🚑 ER</button>
        <button class="opt" onclick="sel('black_hole',this)">🕳️ Black Hole</button>
        <button class="opt" onclick="sel('armory',this)">⚔️ Armory</button>
    </div>
    <div id="grid"></div>
    <div style="padding:10px; text-align:center;">
        <button onclick="socket.emit('set_phase', 2)">Phase 2: Spawn</button>
        <button onclick="socket.emit('set_phase', 3)">Phase 3: Start</button>
        <button onclick="socket.emit('next_turn')">Force Next Turn</button>
    </div>
    <script>
        const socket = io(); let curS = "empty";
        function sel(t, e) { curS = t; document.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel')); e.classList.add('sel'); }
        socket.on('sync', d => {
            const g = document.getElementById('grid'); g.innerHTML = '';
            for(let y=0; y<10; y++){
                for(let x=0; x<10; x++){
                    const td = d.maze[y][x]; const c = document.createElement('div'); c.className = 'cell';
                    if(td.walls.top) c.classList.add('wall-top'); if(td.walls.left) c.classList.add('wall-left');
                    if(td.tile !== "empty") c.style.backgroundImage = `url('/static/${td.tile}.png')`;
                    if(td.is_birthplace) { c.style.backgroundColor = '#ccf'; const lbl = document.createElement('div'); lbl.innerText = '👶 '+td.birth_owner_name; lbl.style.fontSize='8px'; lbl.style.color='#000'; c.appendChild(lbl); }
                    
                    const playersHere = d.players.filter(p => p.x === x && p.y === y && p.has_spawned);
                    if(playersHere.length > 0) {
                        const dot = document.createElement('div');
                        dot.style.cssText = "width:10px;height:10px;background:red;border-radius:50%;margin:auto;";
                        c.appendChild(dot);
                    }

                    c.onpointerdown = (e) => {
                        if(e.button === 2) {
                            if(e.offsetY < 15) d.maze[y][x].walls.top = !d.maze[y][x].walls.top;
                            else d.maze[y][x].walls.left = !d.maze[y][x].walls.left;
                        } else { d.maze[y][x].tile = curS; }
                        socket.emit('update_maze', d.maze);
                    };
                    c.oncontextmenu = (e) => e.preventDefault();
                    g.appendChild(c);
                }
            }
        });
        socket.emit('join', { name: "Host", is_man: true });
    </script>
</body>
</html>
