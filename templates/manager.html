<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><title>Host Monitor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #sidebar { background: #222; padding: 10px; display: flex; gap: 5px; overflow-x: auto; border-bottom: 2px solid #444; }
        #grid-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; direction: ltr; }
        #grid { display: grid; grid-template-columns: 25px repeat(10, 45px); grid-template-rows: 25px repeat(10, 45px); gap: 1px; background: #444; }
        .cell { width: 45px; height: 45px; background: #fff; position: relative; background-size: contain; border: 1px solid #ccc; cursor: pointer; }
        .coord { background: #333; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .wall-top { border-top: 5px solid red; }
        .wall-left { border-left: 5px solid red; }
        .p-wrap { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; z-index: 10; }
        .p-dot { width: 12px; height: 12px; background: cyan; border-radius: 50%; border: 1px solid #000; }
        .p-name { font-size: 8px; background: rgba(0,0,0,0.8); color: white; padding: 1px 3px; border-radius: 2px; margin-top: 2px; }
        .tile-opt { padding: 5px 10px; background: #444; border: 1px solid #666; cursor: pointer; font-size: 11px; white-space: nowrap; color: #fff; }
        .sel { background: cyan; color: #000; }
    </style>
</head>
<body>
    <div id="sidebar">
        <button class="tile-opt sel" onclick="sel('empty',this)">Floor</button>
        <button class="tile-opt" onclick="sel('treasure',this)">💰 Treasure</button>
        <button class="tile-opt" onclick="sel('fake_treasure',this)">💎 Fake</button>
        <button class="tile-opt" onclick="sel('river',this)">💧 River</button>
        <button class="tile-opt" onclick="sel('river_start',this)">🌊 Start</button>
        <button class="tile-opt" onclick="sel('boat',this)">🛶 Boat</button>
        <button class="tile-opt" onclick="sel('raft',this)">🪵 Raft</button>
        <button class="tile-opt" onclick="sel('flashlight',this)">🔦 Flash</button>
        <button class="tile-opt" onclick="sel('batteries',this)">🔋 Battery</button>
        <button class="tile-opt" onclick="sel('exit',this)">🚪 Exit</button>
        <button class="tile-opt" onclick="sel('monster',this)">👾 Monster</button>
        <button class="tile-opt" onclick="sel('devil',this)">😈 Devil</button>
        <button class="tile-opt" onclick="sel('clinic',this)">🏥 Clinic</button>
        <button class="tile-opt" onclick="sel('er',this)">🚑 ER</button>
        <button class="tile-opt" onclick="sel('black_hole',this)">🕳️ BlackHole</button>
        <button class="tile-opt" onclick="sel('armory',this)">⚔️ Armory</button>
    </div>
    <div id="grid-container"><div id="grid"></div></div>
    <div style="padding: 15px; background: #222; display: flex; gap: 10px; justify-content: center;">
        <div id="tele-wait"></div>
        <button onclick="socket.emit('set_phase', 2)">Phase 2: Spawn</button>
        <button onclick="socket.emit('set_phase', 3)">Phase 3: Start</button>
        <button onclick="socket.emit('next_turn')">Next Turn</button>
    </div>
    <script>
        const socket = io(); let mazeD = [], curS = "empty", phase = 1, teleT = null;
        function sel(t, e) { curS = t; document.querySelectorAll('.tile-opt').forEach(b=>b.classList.remove('sel')); e.classList.add('sel'); }
        socket.on('sync', d => {
            mazeD = d.maze; phase = d.phase;
            const waiters = d.players.filter(p => p.waiting_teleport);
            document.getElementById('tele-wait').innerHTML = waiters.map(p => `<button onclick="teleT='${p.id}';alert('Click empty cell to teleport ${p.n}')">Teleport ${p.n}</button>`).join(' ');
            
            const g = document.getElementById('grid'); g.innerHTML = '';
            g.appendChild(document.createElement('div'));
            for(let i=1; i<=10; i++){ const h=document.createElement('div'); h.className='coord'; h.innerText=i; g.appendChild(h); }
            
            for(let y=0; y<10; y++){
                const l=document.createElement('div'); l.className='coord'; l.innerText=y+1; g.appendChild(l);
                for(let x=0; x<10; x++){
                    const td = d.maze[y][x]; const c = document.createElement('div'); c.className = 'cell';
                    if(td.walls.top) c.classList.add('wall-top'); if(td.walls.left) c.classList.add('wall-left');
                    
                    if(td.tile !== "empty") {
                        c.style.backgroundImage = `url('/static/${td.tile}.png')`;
                    }

                    d.players.forEach(p => {
                        if(p.x === x && p.y === y && p.has_spawned){
                            const w = document.createElement('div'); w.className='p-wrap';
                            w.innerHTML = `<div class="p-dot" style="background:${p.is_lost?'red':'cyan'}"></div><div class="p-name">${p.n}</div>`;
                            c.appendChild(w);
                        }
                    });

                    c.onmousedown = (e) => {
                        if(teleT && td.tile === "empty") { socket.emit('host_teleport', {target_id: teleT, x, y}); teleT = null; return; }
                        if(phase === 1) {
                            const r = c.getBoundingClientRect();
                            if(e.button === 0) d.maze[y][x].tile = curS;
                            else { if(e.clientY - r.top < 12) d.maze[y][x].walls.top = !d.maze[y][x].walls.top; else d.maze[y][x].walls.left = !d.maze[y][x].walls.left; }
                            socket.emit('update_maze', d.maze);
                        }
                    };
                    g.appendChild(c);
                }
            }
        });
        socket.emit('join', { name: "Host", is_man: true });
    </script>
</body>
</html>
