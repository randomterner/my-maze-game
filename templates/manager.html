<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><title>Manager - Host</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { display: flex; background: #1a1a1a; color: white; margin: 0; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #sidebar { width: 230px; background: #222; padding: 10px; border-left: 2px solid #444; border-right: 2px solid #444; overflow-y: auto; display: flex; flex-direction: column; }
        
        #grid-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; direction: ltr !important; }
        #grid { display: grid; grid-template-columns: repeat(10, 50px); gap: 1px; background: #444; padding: 5px; }
        
        .cell { width: 50px; height: 50px; background: #fff; position: relative; background-size: contain; box-sizing: border-box; cursor: pointer; }
        .wall-top { box-shadow: inset 0 6px 0 0 #ff4d4d; }
        .wall-left { box-shadow: inset 6px 0 0 0 #ff4d4d; }
        .tile-opt { padding: 6px; margin: 3px 0; background: #333; cursor: pointer; border-radius: 4px; text-align: center; font-size: 13px; border: 1px solid #555; }
        .selected { border: 2px solid #2ecc71; background: #1e5631; }
        .btn { width: 100%; padding: 10px; margin: 5px 0; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; }
        
        #log-box { flex-grow: 1; background: #000; margin-top: 10px; padding: 8px; font-size: 11px; overflow-y: auto; border: 1px solid #444; color: #0f0; }
        .p-dot { width: 14px; height: 14px; background: #00ffff; border-radius: 50%; position: absolute; top: 18px; left: 18px; border: 2px solid black; z-index: 10; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="sidebar">
        <h3>כלים</h3>
        <div id="tools">
            <div class="tile-opt selected" onclick="sel('empty', this)">רצפה</div>
            <div class="tile-opt" onclick="sel('treasure', this)">💰 אוצר</div>
            <div class="tile-opt" onclick="sel('fake_treasure', this)">💎 מזויף</div>
            <div class="tile-opt" onclick="sel('armory', this)">⚔️ נשקייה</div>
            <div class="tile-opt" onclick="sel('monster', this)">👾 מפלצת</div>
            <div class="tile-opt" onclick="sel('devil', this)">😈 שטן</div>
            <div class="tile-opt" onclick="sel('river_start', this)">🌊 נהר התחלה</div>
            <div class="tile-opt" onclick="sel('river', this)">💧 נהר</div>
            <div class="tile-opt" onclick="sel('flashlight', this)">🔦 פנס</div>
            <div class="tile-opt" onclick="sel('batteries', this)">🔋 סוללות</div>
            <div class="tile-opt" onclick="sel('boat', this)">🛶 סירה</div>
            <div class="tile-opt" onclick="sel('raft', this)">🪵 רפסודה</div>
            <div class="tile-opt" onclick="sel('clinc', this)">🏥 מרפאה</div>
            <div class="tile-opt" onclick="sel('er', this)">🚑 מיון</div>
            <div class="tile-opt" onclick="sel('black_hole', this)">🕳️ חור שחור</div>
            <div class="tile-opt" onclick="sel('exit', this)">🚪 יציאה</div>
        </div>
        <hr>
        <button class="btn" style="background:#e67e22" onclick="socket.emit('set_phase', 2)">Set SPAWN</button>
        <button class="btn" style="background:#2ecc71" onclick="socket.emit('set_phase', 3)">START GAME</button>
        
        <div id="log-box"></div>
    </div>

    <div id="grid-area">
        <h2 id="phase-txt" style="direction: rtl;">שלב: 1</h2>
        <div id="grid"></div>
    </div>

    <script>
        const socket = io(); let currentSel = "empty"; let localMaze = []; let phase = 1;
        function sel(t, e) { currentSel = t; document.querySelectorAll('.tile-opt').forEach(o => o.classList.remove('selected')); e.classList.add('selected'); }

        socket.on('sync', d => {
            localMaze = d.maze; phase = d.phase;
            document.getElementById('phase-txt').innerText = "שלב: " + d.phase;
            
            // עדכון לוג למנחה
            document.getElementById('log-box').innerHTML = d.logs.map(l => `<div><b>${l.n}</b>: ${l.key}</div>`).join('');
            
            const g = document.getElementById('grid'); g.innerHTML = '';
            for(let y=0; y<10; y++) for(let x=0; x<10; x++) {
                const td = d.maze[y][x]; const cell = document.createElement('div'); cell.className = 'cell';
                if(td.walls.top) cell.classList.add('wall-top');
                if(td.walls.left) cell.classList.add('wall-left');
                if(td.tile !== "empty") cell.style.backgroundImage = `url('/static/${td.tile}.png')`;
                
                // הצגת שחקנים למנחה
                d.players.forEach(p => {
                    if(p.x === x && p.y === y) {
                        const dot = document.createElement('div');
                        dot.className = 'p-dot';
                        cell.appendChild(dot);
                    }
                });

                cell.onmousedown = (e) => {
                    if (phase !== 1) return;
                    if (e.button === 2) {
                        const r = cell.getBoundingClientRect();
                        if (e.clientY - r.top < 15) localMaze[y][x].walls.top = !localMaze[y][x].walls.top;
                        else if (e.clientX - r.left < 15) localMaze[y][x].walls.left = !localMaze[y][x].walls.left;
                    } else { localMaze[y][x].tile = currentSel; }
                    socket.emit('update_maze', localMaze);
                };
                g.appendChild(cell);
            }
        });
        socket.emit('join', { name: "Host", is_man: true });
    </script>
</body>
</html>
