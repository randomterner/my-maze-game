<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><title>מנחה</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { display: flex; background: #1a1a1a; color: white; margin: 0; font-family: sans-serif; }
        #sidebar { width: 220px; background: #222; padding: 15px; border-left: 1px solid #444; height: 100vh; }
        #grid { display: grid; grid-template-columns: repeat(10, 50px); gap: 2px; padding: 20px; }
        .cell { width: 50px; height: 50px; background: #fff; border: 1px solid #ccc; color: black; font-size: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .opt { padding: 8px; margin: 2px; background: #333; cursor: pointer; border: 1px solid #555; text-align: center; }
        .selected { background: #007bff; }
        #tp-zone { border: 2px solid orange; padding: 10px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>עורך מבוך</h3>
        <div id="opts"></div>
        <div id="tp-zone">שיגור: <b id="tp-target"></b><br><small>בחר משבצת לבנה</small></div>
    </div>
    <div id="grid"></div>
    <script>
        const socket = io();
        let sel = "empty", targetSid = null;
        let maze = Array(10).fill().map(() => Array(10).fill().map(() => ({tile: "empty", walls: {top: false, left: false}})));
        const types = ["empty", "treasure", "exit", "river", "river_start", "black_hole", "clinic", "monster", "boat", "raft"];
        const limits = { treasure: 1, exit: 1, river_start: 1, black_hole: 1, monster: 1, clinic: 1, boat: 1, raft: 1, river: 20 };

        types.forEach(t => {
            const d = document.createElement('div'); d.className = 'opt'; d.innerText = t;
            d.onclick = () => { sel = t; document.querySelectorAll('.opt').forEach(o=>o.classList.remove('selected')); d.className += ' selected'; };
            document.getElementById('opts').appendChild(d);
        });

        const g = document.getElementById('grid');
        for(let y=0; y<10; y++){
            for(let x=0; x<10; x++){
                const c = document.createElement('div'); c.className = 'cell'; c.id = `c-${x}-${y}`;
                c.onmousedown = (e) => {
                    if(targetSid) {
                        if(maze[y][x].tile === "empty") {
                            socket.emit('teleport_player', {target_sid: targetSid, x: x, y: y});
                            targetSid = null; document.getElementById('tp-zone').style.display='none';
                        } return;
                    }
                    if(e.button === 0) {
                        const count = maze.flat().filter(i => i.tile === sel).length;
                        if(sel !== 'empty' && count >= (limits[sel] || 1)) return;
                        maze[y][x].tile = sel;
                    } else if(e.button === 1) { maze[y][x].tile = "empty"; }
                    render(); socket.emit('save_maze', {maze});
                };
                g.appendChild(c);
            }
        }
        socket.on('bh_event', d => { targetSid = d.sid; document.getElementById('tp-target').innerText = d.n; document.getElementById('tp-zone').style.display = 'block'; });
        function render() {
            for(let y=0; y<10; y++) for(let x=0; x<10; x++) document.getElementById(`c-${x}-${y}`).innerText = maze[y][x].tile.substring(0,3);
        }
    </script>
</body>
</html>
