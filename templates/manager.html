<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><title>מנחה - בקרה</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { display: flex; background: #1a1a1a; color: white; margin: 0; font-family: sans-serif; }
        #sidebar { width: 240px; background: #222; padding: 15px; border-left: 1px solid #444; height: 100vh; overflow-y: auto; }
        #grid { display: grid; grid-template-columns: repeat(10, 50px); gap: 2px; padding: 20px; }
        .cell { width: 50px; height: 50px; background: #fff; border: 1px solid #ccc; color: black; font-size: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .wall-top { border-top: 5px solid red !important; }
        .wall-left { border-left: 5px solid red !important; }
        .opt { padding: 8px; margin: 2px; background: #333; cursor: pointer; border: 1px solid #555; text-align: center; }
        .selected { background: #007bff; }
        .btn { width: 100%; padding: 10px; margin: 5px 0; cursor: pointer; font-weight: bold; border: none; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>שלב: <span id="cp">1</span></h3>
        <button class="btn" onclick="socket.emit('set_phase',{phase:1})">1. בנייה</button>
        <button class="btn" onclick="socket.emit('set_phase',{phase:2})">2. הולדה</button>
        <button class="btn" onclick="socket.emit('set_phase',{phase:3})" style="background:lime">3. התחל!</button>
        <hr><div id="opts"></div>
    </div>
    <div id="grid"></div>
    <script>
        const socket = io();
        let sel = "empty", maze = Array(10).fill().map(() => Array(10).fill().map(() => ({tile: "empty", walls: {top: false, left: false}})));
        const types = ["empty", "treasure", "exit", "river", "river_start", "black_hole", "clinic", "er", "armory", "monster", "boat", "raft", "flashlight", "batteries"];
        
        types.forEach(t => {
            const d = document.createElement('div'); d.className = 'opt'; d.innerText = t;
            d.onclick = () => { sel = t; document.querySelectorAll('.opt').forEach(o=>o.classList.remove('selected')); d.classList.add('selected'); };
            document.getElementById('opts').appendChild(d);
        });

        const g = document.getElementById('grid');
        for(let y=0; y<10; y++){
            for(let x=0; x<10; x++){
                const c = document.createElement('div'); c.className = 'cell'; c.id = `c-${x}-${y}`;
                c.oncontextmenu = (e) => e.preventDefault();
                c.onmousedown = (e) => {
                    const rect = c.getBoundingClientRect();
                    if(e.button === 0) maze[y][x].tile = sel;
                    else if(e.button === 2) {
                        if(e.clientY - rect.top < 15) maze[y][x].walls.top = !maze[y][x].walls.top;
                        else if(e.clientX - rect.left < 15) maze[y][x].walls.left = !maze[y][x].walls.left;
                    } else if(e.button === 1) maze[y][x].tile = "empty";
                    render(); socket.emit('save_maze', {maze});
                };
                g.appendChild(c);
            }
        }
        function render() {
            for(let y=0; y<10; y++) for(let x=0; x<10; x++) {
                const c = document.getElementById(`c-${x}-${y}`);
                c.className = 'cell ' + (maze[y][x].walls.top ? 'wall-top ' : '') + (maze[y][x].walls.left ? 'wall-left' : '');
                c.innerText = maze[y][x].tile.substring(0,3);
            }
        }
        socket.on('sync', d => { document.getElementById('cp').innerText = d.phase; });
    </script>
</body>
</html>
